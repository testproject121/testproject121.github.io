<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clipboard Read Probe</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1220;
      --panel: #111b2e;
      --border: #29405f;
      --text: #e8eef8;
      --muted: #9caec9;
      --accent: #7aa2ff;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(122, 162, 255, 0.18), transparent 28%),
        linear-gradient(180deg, #08111d 0%, var(--bg) 100%);
      color: var(--text);
      font: 15px/1.55 var(--mono);
      padding: 32px 18px;
    }
    main {
      max-width: 860px;
      margin: 0 auto;
    }
    section {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(17, 27, 46, 0.96), rgba(11, 18, 32, 0.98));
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }
    header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      letter-spacing: -0.03em;
    }
    p {
      margin: 0;
      color: var(--muted);
    }
    .body {
      padding: 22px 24px 24px;
    }
    pre {
      margin: 18px 0 0;
      min-height: 320px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(5, 10, 18, 0.96);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    code {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <section>
      <header>
        <h1>Clipboard Read Probe</h1>
        <p>
          Open this page inside Cursor's built-in browser.
          Secure-context state, permission state, and <code>navigator.clipboard.readText()</code>
          output are captured automatically on page load.
        </p>
      </header>
      <div class="body">
        <pre id="out"></pre>
      </div>
    </section>
  </main>
  <script>
    const out = document.getElementById("out");

    function log(key, value) {
      const line = key + ": " + (typeof value === "string" ? value : JSON.stringify(value));
      out.textContent += line + "\n";
      console.log(line);
    }

    async function probe() {
      out.textContent = "";
      log("userAgent", navigator.userAgent);
      log("href", location.href);
      log("origin", location.origin);
      log("isSecureContext", window.isSecureContext);
      log("hasClipboardAPI", !!(navigator.clipboard && navigator.clipboard.readText));

      let permState = "unknown";
      try {
        const permission = await navigator.permissions.query({ name: "clipboard-read" });
        permState = permission.state;
      } catch (error) {
        permState = "query-failed: " + error.message;
      }
      log("clipboard-read permission", permState);

      try {
        const text = await navigator.clipboard.readText();
        log("clipboard.readText length", text.length);
        log("clipboard.readText preview", text.slice(0, 80));
      } catch (error) {
        log("clipboard.readText error", error.name + ": " + error.message);
      }
    }

    probe();
  </script>
</body>
</html>
